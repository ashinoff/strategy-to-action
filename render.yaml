services:
  - type: web
    name: urru-planner
    runtime: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./public
    envVars: []
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
